name: daily-pipeline
on:
  schedule:
    - cron: '30 10 * * 1-5'   # Taipei 18:30 (UTC+8)
    - cron: '30 13 * * 1-5'   # Taipei 21:30 (UTC+8)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    # 20 分鐘在 2026-07-17 被證實不足：cache_daily_holding_closes（每日 close 快取）
    # 與缺口日的還原價全面重抓會讓 metrics 階段超時，job 被砍在彙總步驟之前。
    timeout-minutes: 45
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run pipeline
        working-directory: scraper
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: uv run python -m activeetf.pipeline
      - name: Alert on failure
        # timeout 取消在 Actions 語意是 cancelled 不是 failure，只寫 failure() 會靜默
        if: failure() || cancelled()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `pipeline 失敗 ${new Date().toISOString().slice(0, 10)}`,
              body: `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
